<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense">
<meta name="theme-color" content="#0b0d10">
<title>Expense</title>
<style>
  :root{
    --bg:#0b0d10; --card:#14171c; --line:#232830; --ink:#f2f4f7;
    --dim:#8a929e; --accent:#4ade80; --accent-ink:#052e16; --warn:#f5a524;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:18px;min-height:100%;
  }
  .amount-wrap{text-align:center;padding:14px 0 4px}
  .amount-label{color:var(--dim);font-size:13px;letter-spacing:.08em;text-transform:uppercase}
  .amount-display{
    font-size:clamp(40px,15vw,64px);font-weight:700;letter-spacing:-.02em;
    margin-top:6px;min-height:1.1em;font-variant-numeric:tabular-nums;
  }
  .amount-display .zero{color:var(--line)}
  .amount-display .dong{color:var(--dim);font-size:.5em;font-weight:500;margin-left:.15em}
  input#raw{position:absolute;opacity:0;pointer-events:none;height:0;width:0}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    font-size:26px;font-weight:600;padding:18px 0;border-radius:14px;
    cursor:pointer;user-select:none;transition:background .08s;
  }
  .key:active{background:#20252e}
  .key.util{font-size:20px;color:var(--dim)}
  .cats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .cat{
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:12px 6px;border-radius:12px;font-size:14px;font-weight:500;
    cursor:pointer;user-select:none;text-align:center;transition:all .08s;
  }
  .cat:active{transform:scale(.97)}
  .cat.sel{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:700}
  .note{
    width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:13px 14px;border-radius:12px;font-size:15px;font-family:inherit;
  }
  .note::placeholder{color:var(--dim)}
  .submit{
    width:100%;padding:18px;border:none;border-radius:14px;
    background:var(--accent);color:var(--accent-ink);font-size:18px;font-weight:700;
    cursor:pointer;transition:opacity .12s,transform .08s;
  }
  .submit:disabled{opacity:.35;cursor:default}
  .submit:not(:disabled):active{transform:scale(.99)}
  .toast{
    position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:var(--accent-ink);font-weight:700;
    padding:14px 22px;border-radius:999px;font-size:15px;
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
    box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .spacer{flex:1}
</style>
</head>
<body>
  <div class="amount-wrap">
    <div class="amount-label">Amount</div>
    <div class="amount-display" id="display"><span class="zero">0</span><span class="dong">₫</span></div>
  </div>

  <div class="cats" id="cats"></div>

  <input class="note" id="note" placeholder="Note (optional)" autocomplete="off">

  <div class="keypad" id="keypad"></div>

  <button class="submit" id="submit" disabled>Log expense</button>

  <div class="toast" id="toast"></div>
  <iframe name="sink" style="display:none"></iframe>

<script>
const FORM="https://docs.google.com/forms/d/e/1FAIpQLSej8haAP1D6pSev5KjJB1GBSgGhoeD5aNDUwXnY9nIPTkLgBg/formResponse";
const F={amount:"entry.591231848",category:"entry.332892810",note:"entry.1552187130"};
const CATS=["Meals","Groceries","Transport","Going Out","Support","Bills","Health","Shopping","Travel","Visa","Other"];

let raw="", cat=null;
const display=document.getElementById("display");
const submit=document.getElementById("submit");
const toast=document.getElementById("toast");
const note=document.getElementById("note");

function fmt(){
  if(!raw){display.innerHTML='<span class="zero">0</span><span class="dong">₫</span>';return;}
  const n=Number(raw).toLocaleString("en-US");
  display.innerHTML=n+'<span class="dong">₫</span>';
}
function refresh(){submit.disabled=!(raw && cat);}

// keypad
const keys=["1","2","3","4","5","6","7","8","9","000","0","⌫"];
const kp=document.getElementById("keypad");
keys.forEach(k=>{
  const b=document.createElement("button");
  b.className="key"+(k==="⌫"||k==="000"?" util":"");
  b.textContent=k;
  b.onclick=()=>{
    if(k==="⌫") raw=raw.slice(0,-1);
    else if(k==="000"){ if(raw) raw=(raw+"000").slice(0,12); }
    else { if((raw+k).length<=12) raw=(raw+k).replace(/^0+(?=\d)/,""); }
    fmt();refresh();
  };
  kp.appendChild(b);
});

// categories
const cc=document.getElementById("cats");
CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="cat";b.textContent=c;
  b.onclick=()=>{
    cat=c;
    [...cc.children].forEach(x=>x.classList.toggle("sel",x.textContent===c));
    refresh();
  };
  cc.appendChild(b);
});
// default selection: Meals
cat="Meals";
[...cc.children].forEach(x=>x.classList.toggle("sel",x.textContent==="Meals"));

function showToast(msg){
  toast.textContent=msg;toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1900);
}

submit.onclick=()=>{
  if(!raw||!cat) return;
  const amt=Number(raw).toLocaleString("en-US");
  // build a hidden form POST to Google Forms (no CORS issues, fire-and-forget)
  const f=document.createElement("form");
  f.action=FORM;f.method="POST";f.target="sink";
  const add=(name,val)=>{const i=document.createElement("input");i.type="hidden";i.name=name;i.value=val;f.appendChild(i);};
  add(F.amount,raw);
  add(F.category,cat);
  add(F.note,note.value.trim());
  document.body.appendChild(f);f.submit();document.body.removeChild(f);
  showToast("Logged  "+amt+" ₫ · "+cat);
  // reset for next entry (default back to Meals)
  raw="";cat="Meals";note.value="";
  [...cc.children].forEach(x=>x.classList.toggle("sel",x.textContent==="Meals"));
  fmt();refresh();
  if(navigator.vibrate) navigator.vibrate(15);
};
</script>
</body>
</html>
